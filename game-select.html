<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>틀린그림찾기 - 게임 선택</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
      color: white;
    }

    .title {
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .subtitle {
      font-size: 1.2rem;
      opacity: 0.9;
    }

    .game-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 30px;
      margin-bottom: 40px;
    }

    .game-card {
      background: white;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .game-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .game-card.disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .game-card.disabled:hover {
      transform: none;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 5px;
    }

    .card-status {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
    }

    .status-ready {
      background: #e8f5e8;
      color: #27ae60;
    }

    .status-disabled {
      background: #ffe8e8;
      color: #e74c3c;
    }

    .card-preview {
      position: relative;
      height: 250px;
      border-radius: 15px;
      overflow: hidden;
      margin-bottom: 20px;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #e9ecef;
    }
    
    .preview-images {
      display: flex;
      width: 100%;
      height: 100%;
      gap: 3px;
    }
    
    .preview-image {
      flex: 1;
      object-fit: cover;
      height: 100%;
      border-radius: 8px;
      transition: transform 0.2s ease;
    }
    
    .preview-image:hover {
      transform: scale(1.02);
    }
    
    .preview-separator {
      width: 3px;
      background: linear-gradient(to bottom, #667eea, #764ba2);
      border-radius: 2px;
      box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
      flex-shrink: 0;
    }
    
    .no-image {
      color: #95a5a6;
      font-size: 1.1rem;
      padding: 20px;
      text-align: center;
      background: linear-gradient(135deg, #f8f9fa, #e9ecef);
      border-radius: 10px;
      border: 2px dashed #bdc3c7;
    }
    
    .card-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: #7f8c8d;
    }
    
    .info-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    
    .play-button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .play-button:hover:not(:disabled) {
      background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
      transform: translateY(-2px);
    }

    .play-button:disabled {
      background: #95a5a6;
      cursor: not-allowed;
      transform: none;
    }

    .loading {
      text-align: center;
      padding: 60px;
      color: white;
      font-size: 1.2rem;
    }

    .loading::after {
      content: '';
      animation: dots 1.5s steps(5, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

    .error {
      text-align: center;
      background: rgba(231, 76, 60, 0.9);
      color: white;
      padding: 20px;
      border-radius: 15px;
      margin: 20px 0;
    }

    .admin-link {
      text-align: center;
      margin-top: 30px;
    }

    .admin-link a {
      color: white;
      text-decoration: none;
      opacity: 0.8;
      font-size: 0.9rem;
      transition: opacity 0.3s ease;
    }

    .admin-link a:hover {
      opacity: 1;
    }

    @media (max-width: 768px) {
      .title {
        font-size: 2.2rem;
      }
      
      .game-cards {
        grid-template-columns: 1fr;
        gap: 20px;
      }
      
      .card-preview {
        height: 200px;
      }
      
      .preview-images {
        gap: 2px;
      }
      
      .preview-separator {
        width: 2px;
      }
      
      .preview-image {
        border-radius: 6px;
      
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">🎮 틀린그림찾기</h1>
      <p class="subtitle">원하는 이미지를 선택하고 게임을 시작해보세요!</p>
    </div>

    <div id="loading" class="loading">
      게임 목록을 불러오는 중
    </div>

    <div id="errorMessage" class="error" style="display: none;"></div>

    <div id="gameCards" class="game-cards" style="display: none;"></div>

    <div class="admin-link">
      <a href="compare-images.html">🔧 관리자 도구 (차이점 설정)</a>
    </div>
  </div>

  <script>
    let imageSets = [];

    async function loadGameList() {
      try {
        showLoading(true);
        
       // 수정
   const response = await fetch('https://ysvxjmqdafldfrmdscvd.supabase.co/functions/v1/image-sets-migrated', {
     headers: {
       'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzdnhqbXFkYWZsZGZybWRzY3ZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzM3NTkyNTQsImV4cCI6MjA0OTMzNTI1NH0.xfmyOjNPHzPFJMJhE5yXo5gGIbQANGkLlPZGAiCO1Zw',
       'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlzdnhqbXFkYWZsZGZybWRzY3ZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzM3NTkyNTQsImV4cCI6MjA0OTMzNTI1NH0.xfmyOjNPHzPFJMJhE5yXo5gGIbQANGkLlPZGAiCO1Zw'
     }
   });
        if (!response.ok) {
          throw new Error('게임 목록을 불러올 수 없습니다.');
        }
        
        imageSets = await response.json();
        console.log('로드된 이미지 세트:', imageSets);
        
        await renderGameCards();
        
        showLoading(false);
        document.getElementById('gameCards').style.display = 'grid';
        
      } catch (error) {
        console.error('게임 목록 로드 오류:', error);
        showError(error.message);
        showLoading(false);
      }
    }

    async function renderGameCards() {
      const container = document.getElementById('gameCards');
      container.innerHTML = '';
      
      for (const imageSet of imageSets) {
        const card = await createGameCard(imageSet);
        container.appendChild(card);
      }
    }

    async function createGameCard(imageSet) {
      const card = document.createElement('div');
      card.className = `game-card ${!isGameReady(imageSet) ? 'disabled' : ''}`;
      
      // 정답 데이터 확인
      let answerCount = 0;
      let isReady = false;
      
      if (isGameReady(imageSet)) {
        try {
          const answerResponse = await fetch(`https://ysvxjmqdafldfrmdscvd.supabase.co/functions/v1/answer-points-migrated/${imageSet.id}`);
          if (answerResponse.ok) {
            const answerData = await answerResponse.json();
            answerCount = answerData.regions ? answerData.regions.length : 0;
            isReady = answerCount > 0;
          }
        } catch (error) {
          console.log(`정답 데이터 조회 실패 (ID: ${imageSet.id}):`, error.message);
        }
      }
      
      card.innerHTML = `
        <div class="card-header">
          <div>
            <div class="card-title">${imageSet.name}</div>
          </div>
          <div class="card-status ${isReady ? 'status-ready' : 'status-disabled'}">
            ${isReady ? '플레이 가능' : '준비 중'}
          </div>
        </div>
        
        <div class="card-preview">
          ${isGameReady(imageSet) ? `
            <div class="preview-images">
              <img src="${imageSet.original_image_url}" alt="원본" class="preview-image" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjE1MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZjBmMGYwIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPuybkOuzuCDsnbTrr7jsp4A8L3RleHQ+PC9zdmc+'">
              <div class="preview-separator"></div>
              <img src="${imageSet.modified_image_url}" alt="수정" class="preview-image" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjE1MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZjBmMGYwIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPuyImOyglSDsnbTrr7jsp4A8L3RleHQ+PC9zdmc+'">
            </div>
          ` : `
            <div class="no-image">이미지가 설정되지 않았습니다</div>
          `}
        </div>
        
        <div class="card-info">
          <div class="info-item">
            <span>🎯</span>
            <span>차이점: ${answerCount}개</span>
          </div>
          <div class="info-item">
            <span>📊</span>
            <span>난이도: ${getDifficulty(answerCount)}</span>
          </div>
          <div class="info-item">
            <span>⏱️</span>
            <span>예상시간: ${getEstimatedTime(answerCount)}</span>
          </div>
        </div>
        
        <button class="play-button" ${!isReady ? 'disabled' : ''} onclick="startGame(${imageSet.id})">
          ${isReady ? '🎮 게임 시작' : '⚠️ 준비 중'}
        </button>
      `;
      
      return card;
    }

    function isGameReady(imageSet) {
      return imageSet.original_image_url && 
             imageSet.modified_image_url && 
             imageSet.original_image_url.trim() !== '' && 
             imageSet.modified_image_url.trim() !== '';
    }

    function getDifficulty(answerCount) {
      if (answerCount === 0) return '미설정';
      if (answerCount <= 3) return '쉬움';
      if (answerCount <= 7) return '보통';
      return '어려움';
    }

    function getEstimatedTime(answerCount) {
      if (answerCount === 0) return '미정';
      const minutes = Math.max(1, Math.ceil(answerCount * 0.5));
      return `${minutes}분`;
    }

    function startGame(imageSetId) {
      // 게임 플레이 페이지로 이동
      window.location.href = `game/game-play.html?id=${imageSetId}`;
    }

    function showLoading(show) {
      document.getElementById('loading').style.display = show ? 'block' : 'none';
    }

    function showError(message) {
      const errorEl = document.getElementById('errorMessage');
      errorEl.textContent = message;
      errorEl.style.display = 'block';
      
      setTimeout(() => {
        errorEl.style.display = 'none';
      }, 5000);
    }

    // 페이지 로드시 게임 목록 불러오기
    window.addEventListener('load', function() {
      console.log('게임 선택 페이지 로드, 게임 목록 불러오기 시작');
      loadGameList();
    });
  </script>
</body>
</html>
